<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Exitosa TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#d50000">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:white;
    overflow:hidden;
}

/* SPLASH */

.splash{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation:fadeOut 2s forwards;
    animation-delay:2s;
}

.splash h1{
    color:#ff0000;
    font-size:45px;
    letter-spacing:2px;
}

@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}

/* HEADER */

.header{
    position:fixed;
    top:0;
    width:100%;
    height:65px;
    background:rgba(0,0,0,0.9);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    z-index:1000;
    border-bottom:1px solid #222;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#ff0000;
}

.live{
    background:red;
    padding:6px 12px;
    border-radius:30px;
    font-size:14px;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:0.5;}
    100%{opacity:1;}
}

/* VIDEO */

.player-container{
    width:100%;
    height:100vh;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

/* PLAY BUTTON */

.center-play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:90px;
    height:90px;
    background:rgba(255,0,0,0.8);
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    cursor:pointer;
    z-index:500;
}

/* BOTTOM NAV */

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    height:70px;
    background:rgba(0,0,0,0.95);
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid #222;
    z-index:1000;
}

.nav-item{
    text-decoration:none;
    color:white;
    font-size:13px;
    text-align:center;
}

.nav-item span{
    display:block;
    font-size:24px;
    margin-bottom:4px;
}

/* FLOAT WHATSAPP */

.float-btn{
    position:fixed;
    right:20px;
    bottom:90px;
    background:#25D366;
    color:white;
    width:65px;
    height:65px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    box-shadow:0 0 20px rgba(37,211,102,0.7);
    z-index:1000;
    animation:whatsappPulse 1.5s infinite;
}

.float-btn img{
    width:35px;
    height:35px;
}

@keyframes whatsappPulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
    100%{
        transform:scale(1);
    }
}

/* WHATSAPP NUMBER */

.whatsapp-text{
    position:fixed;
    right:15px;
    bottom:165px;
    background:#25D366;
    color:white;
    padding:10px 15px;
    border-radius:30px;
    font-size:14px;
    font-weight:bold;
    z-index:1000;
    box-shadow:0 0 15px rgba(37,211,102,0.7);
}

/* INSTALL */

.install-btn{
    position:fixed;
    top:80px;
    right:15px;
    background:#ff0000;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    font-size:15px;
    z-index:999;
    box-shadow:0 0 15px rgba(255,0,0,0.6);
}

</style>
</head>

<body>

<!-- SPLASH -->

<div class="splash">
    <h1>📺 EXITOSA TV</h1>
</div>

<!-- HEADER -->

<div class="header">

    <div class="logo">
        EXITOSA TV
    </div>

    <div class="live">
        ● EN VIVO
    </div>

</div>

<!-- INSTALL BUTTON -->

<button class="install-btn" id="installBtn">
📲 Instalar
</button>

<!-- VIDEO -->

<div class="player-container">

    <video id="video" playsinline controls></video>

    <div class="center-play" id="playBtn">
        ▶
    </div>

</div>

<!-- WHATSAPP -->

<a 
href="https://api.whatsapp.com/send/?phone=51960360178&text=Hola+Radio+Exitosa&type=phone_number&app_absent=0"
class="float-btn"
target="_blank"
>

<img 
src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
alt="WhatsApp"
>

</a>

<!-- WHATSAPP NUMBER -->

<div class="whatsapp-text">
</div>

<!-- MENU -->

<div class="bottom-nav">

    <a href="#" class="nav-item">
        <span>🏠</span>
        Inicio
    </a>

    <a href="https://player.radioexitosa.pe/" class="nav-item">
        <span>📻</span>
        Radio
    </a>

    <a href="https://www.exitosanoticias.pe/ultimas-noticias/" class="nav-item">
        <span>📰</span>
        Noticias
    </a>

    <a href="https://www.youtube.com/channel/UCxgO_rak_BKZP8VNVmYqbWg" class="nav-item">
        <span>▶</span>
        Videos
    </a>

</div>

<script>

const video = document.getElementById('video');

const playBtn = document.getElementById('playBtn');

const videoSrc = 'https://luna-4-video.mediaserver.digital/exitosatv_233b-4b49-a726-5a451262/index.m3u8';

if(Hls.isSupported()){

    const hls = new Hls();

    hls.loadSource(videoSrc);

    hls.attachMedia(video);

}else if(video.canPlayType('application/vnd.apple.mpegurl')){

    video.src = videoSrc;

}

/* PLAY */

playBtn.addEventListener('click', ()=>{

    video.play();

    playBtn.style.display = 'none';

});

/* INSTALL APP */

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e)=>{

    e.preventDefault();

    deferredPrompt = e;

});

const installBtn = document.getElementById('installBtn');

installBtn.addEventListener('click', async ()=>{

    if(deferredPrompt){

        deferredPrompt.prompt();

    }

});

/* AUTO HIDE BUTTON */

video.addEventListener('play', ()=>{

    setTimeout(()=>{

        playBtn.style.display = 'none';

    },1000);

});

</script>

</body>
</html>
