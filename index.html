<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exitosa TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#c40000">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#050505;
    color:#fff;
    overflow:hidden;
}

/* SPLASH */

.splash{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(180deg,#000,#111);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:99999;
    animation:fadeOut 1.5s forwards;
    animation-delay:2s;
}

.splash img{
    width:120px;
    margin-bottom:20px;
}

.splash h1{
    font-size:38px;
    font-weight:700;
    color:#fff;
    letter-spacing:2px;
}

.splash span{
    color:#ff2d2d;
}

@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}

/* HEADER */

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:72px;
    padding:0 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(12px);
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:42px;
    height:42px;
    border-radius:10px;
}

.logo h2{
    font-size:22px;
    font-weight:700;
}

.logo span{
    color:#ff2d2d;
}

.live-badge{
    background:#ff1d1d;
    padding:8px 14px;
    border-radius:30px;
    font-size:13px;
    font-weight:600;
    box-shadow:0 0 15px rgba(255,0,0,0.5);
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

/* PLAYER */

.player-container{
    position:relative;
    width:100%;
    height:100vh;
    background:#000;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:#000;
}

/* OVERLAY */

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to top,
    rgba(0,0,0,0.8),
    rgba(0,0,0,0.1),
    rgba(0,0,0,0.7));
    z-index:10;
    pointer-events:none;
}

/* PLAY BUTTON */

.play-button{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(255,0,0,0.9);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    z-index:100;
    backdrop-filter:blur(10px);
    box-shadow:0 0 30px rgba(255,0,0,0.5);
    transition:0.3s;
}

.play-button:hover{
    transform:translate(-50%,-50%) scale(1.08);
}

.play-button span{
    font-size:42px;
    margin-left:5px;
}

/* INFO */

.channel-info{
    position:absolute;
    bottom:110px;
    left:20px;
    z-index:100;
}

.channel-info h1{
    font-size:34px;
    font-weight:700;
}

.channel-info p{
    margin-top:5px;
    font-size:14px;
    color:#ccc;
}

/* WHATSAPP */

.whatsapp{
    position:fixed;
    right:20px;
    bottom:95px;
    width:65px;
    height:65px;
    background:#25D366;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:white;
    font-size:30px;
    z-index:999;
    box-shadow:0 0 20px rgba(37,211,102,0.6);
    transition:0.3s;
}

.whatsapp:hover{
    transform:scale(1.1);
}

/* INSTALL */

.install-btn{
    position:fixed;
    top:85px;
    right:20px;
    background:#ff2d2d;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:14px;
    font-size:14px;
    font-weight:600;
    z-index:1000;
    box-shadow:0 0 20px rgba(255,0,0,0.4);
}

/* BOTTOM MENU */

.bottom-menu{
    position:fixed;
    bottom:0;
    width:100%;
    height:82px;
    background:rgba(0,0,0,0.75);
    backdrop-filter:blur(20px);
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid rgba(255,255,255,0.08);
    z-index:1000;
}

.menu-item{
    text-decoration:none;
    color:white;
    text-align:center;
    font-size:12px;
    transition:0.3s;
}

.menu-item:hover{
    color:#ff2d2d;
}

.menu-item span{
    display:block;
    font-size:24px;
    margin-bottom:5px;
}

</style>
</head>

<body>

<!-- SPLASH -->

<div class="splash">

    <h1><span>EXITOSA</span> TV</h1>

</div>

<!-- HEADER -->

<div class="header">

    <div class="logo">

        <h2><span>EXITOSA</span> TV</h2>

    </div>

    <div class="live-badge">
        ● EN VIVO
    </div>

</div>

<!-- INSTALL -->

<button class="install-btn" id="installBtn">
📲 Instalar App
</button>

<!-- PLAYER -->

<div class="player-container">

    <div class="overlay"></div>

    <video id="video" playsinline></video>

    <div class="play-button" id="playBtn">
        <span>▶</span>
    </div>

    <div class="channel-info">
        <h1>EXITOSA TV</h1>
        <p>Noticias • Actualidad • Cobertura Nacional</p>
    </div>

</div>

<!-- WHATSAPP -->

<a href="https://wa.me/51960360178?text=Hola%20Radio%20Exitosa"
class="whatsapp">

<img 
src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
alt="WhatsApp"
>

</a>

<!-- MENU -->

<div class="bottom-menu">

    <a href="#" class="menu-item">
        <span>🏠</span>
        Inicio
    </a>

    <a href="https://player.radioexitosa.pe/" class="menu-item">
        <span>📻</span>
        Radio
    </a>

    <a href="https://www.exitosanoticias.pe/" class="menu-item">
        <span>📰</span>
        Noticias
    </a>

    <a href="https://www.youtube.com/channel/UCxgO_rak_BKZP8VNVmYqbWg" class="menu-item">
        <span>▶</span>
        Videos
    </a>

</div>

<script>

const video = document.getElementById('video');
const playBtn = document.getElementById('playBtn');

const videoSrc = 'https://luna-4-video.mediaserver.digital/exitosatv_233b-4b49-a726-5a451262/index.m3u8';

if(Hls.isSupported()){

    const hls = new Hls();

    hls.loadSource(videoSrc);

    hls.attachMedia(video);

}else if(video.canPlayType('application/vnd.apple.mpegurl')){

    video.src = videoSrc;

}

/* PLAY */

playBtn.addEventListener('click',()=>{

    video.play();

    playBtn.style.display='none';

});

/* INSTALL APP */

let deferredPrompt;

window.addEventListener('beforeinstallprompt',(e)=>{

    e.preventDefault();

    deferredPrompt = e;

});

document.getElementById('installBtn')
.addEventListener('click',async()=>{

    if(deferredPrompt){

        deferredPrompt.prompt();

    }

});

</script>

</body>
</html>
