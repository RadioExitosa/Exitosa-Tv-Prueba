<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exitosa TV Premium</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#c40000">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:
linear-gradient(to bottom,#070707,#000);

overflow:hidden;
color:white;
position:relative;
}

/* BACKGROUND EFFECTS */

body::before{

content:'';
position:fixed;
inset:0;

background:
radial-gradient(circle at top right,
rgba(255,0,0,.22),
transparent 30%),

radial-gradient(circle at bottom left,
rgba(255,0,0,.14),
transparent 35%),

radial-gradient(circle at center,
rgba(255,0,0,.06),
transparent 45%);

pointer-events:none;
z-index:-1;
}

/* SPLASH */

.splash{

position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;

animation:fadeOut 1s forwards;
animation-delay:2.2s;
}

.splash-content{
text-align:center;
}

.splash-logo{

width:230px;
border-radius:26px;

box-shadow:
0 0 40px rgba(255,0,0,.45),
0 10px 45px rgba(0,0,0,.7);

animation:pulse 2s infinite;
}

.loading-bar{

width:220px;
height:7px;

background:#1c1c1c;

border-radius:20px;

overflow:hidden;

margin:auto;
margin-top:25px;
}

.loading-fill{

width:0%;
height:100%;

background:
linear-gradient(
90deg,
#ff0000,
#ff5e5e
);

animation:loadBar 2s forwards;
}

@keyframes loadBar{

to{
width:100%;
}

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.04);
}

100%{
transform:scale(1);
}

}

@keyframes fadeOut{

to{
opacity:0;
visibility:hidden;
}

}

/* HEADER */

.header{

position:fixed;
top:0;
left:0;

width:100%;
height:82px;

background:
rgba(0,0,0,.82);

backdrop-filter:blur(14px);

display:flex;
justify-content:space-between;
align-items:center;

padding:0 18px;

z-index:1000;

border-bottom:
1px solid rgba(255,255,255,.05);
}

.logo{

display:flex;
align-items:center;
gap:12px;
}

.logo img{

height:42px;

border-radius:10px;
}

.logo-text{

font-size:26px;
font-weight:800;
letter-spacing:.5px;
}

.logo-text span{
color:#ff0000;
}

.live{

background:
linear-gradient(
135deg,
#ff0000,
#b10000
);

padding:11px 18px;

border-radius:40px;

font-size:13px;
font-weight:700;

box-shadow:
0 5px 22px rgba(255,0,0,.4);
}

/* INSTALL BUTTON */

.install-btn{

position:fixed;

top:95px;
right:18px;

background:
linear-gradient(
135deg,
#ff0000,
#b00000
);

border:none;
color:white;

padding:15px 22px;

border-radius:20px;

font-size:14px;
font-weight:700;

cursor:pointer;

z-index:999;

box-shadow:
0 8px 30px rgba(255,0,0,.38);

transition:.3s;
}

.install-btn:hover{

transform:translateY(-3px) scale(1.03);
}

/* CONTENT */

.content{

width:100%;
height:100vh;

overflow-y:auto;

padding-top:100px;
padding-bottom:130px;
}

/* PLAYER */

.player-wrapper{

position:relative;

width:94%;
margin:auto;

border-radius:30px;

overflow:hidden;

background:#000;

border:
1px solid rgba(255,255,255,.06);

box-shadow:
0 15px 50px rgba(0,0,0,.55),
0 0 25px rgba(255,0,0,.08);
}

.player-wrapper::before{

content:'';

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,.65),
transparent
);

z-index:2;
pointer-events:none;
}

.player-container{

position:relative;

width:100%;
aspect-ratio:16/9;
}

video{

width:100%;
height:100%;

object-fit:cover;

background:black;
}

/* LIVE LABEL */

.live-badge{

position:absolute;

top:18px;
left:18px;

background:
rgba(0,0,0,.7);

backdrop-filter:blur(10px);

padding:10px 16px;

border-radius:18px;

font-size:14px;
font-weight:700;

z-index:5;

display:flex;
align-items:center;
gap:8px;
}

.live-dot{

width:10px;
height:10px;

background:#ff0000;

border-radius:50%;

box-shadow:
0 0 12px #ff0000;
}

/* PLAY BUTTON */

.center-play{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:105px;
height:105px;

border-radius:50%;

background:
linear-gradient(
135deg,
#ff1f1f,
#c00000
);

display:flex;
justify-content:center;
align-items:center;

font-size:42px;

cursor:pointer;

z-index:6;

box-shadow:
0 0 40px rgba(255,0,0,.5);

transition:.3s;
}

.center-play:hover{

transform:
translate(-50%,-50%)
scale(1.08);
}

/* CUSTOM CONTROLS */

.custom-controls{

position:absolute;

bottom:0;
left:0;

width:100%;

padding:16px;

display:flex;
justify-content:space-between;
align-items:center;

z-index:7;
}

.controls-left{

display:flex;
align-items:center;
gap:14px;
}

.control-btn{

width:46px;
height:46px;

border-radius:50%;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(10px);

display:flex;
justify-content:center;
align-items:center;

font-size:20px;

cursor:pointer;
}

.live-text{

color:#ff4a4a;

font-weight:700;

font-size:15px;
}

/* INFO CARD */

.info-box{

width:94%;

margin:22px auto;

padding:28px;

border-radius:28px;

background:
linear-gradient(
145deg,
rgba(18,18,18,.96),
rgba(10,10,10,.92)
);

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 8px 30px rgba(0,0,0,.45);
}

.info-box h2{

font-size:36px;

margin-bottom:16px;
}

.info-box p{

font-size:17px;

line-height:1.8;

color:#cfcfcf;
}

/* EXTRA CARD */

.mini-card{

margin-top:24px;

display:flex;
align-items:center;
gap:16px;

padding:16px;

border-radius:22px;

background:
rgba(255,255,255,.03);

border:
1px solid rgba(255,255,255,.04);
}

.mini-icon{

width:60px;
height:60px;

border-radius:18px;

background:
linear-gradient(
135deg,
#ff0000,
#8d0000
);

display:flex;
justify-content:center;
align-items:center;

font-size:28px;
}

.mini-text h3{

font-size:22px;
margin-bottom:4px;
}

.mini-text p{

font-size:14px;
color:#bbb;
}

/* WHATSAPP */

.float-btn{

position:fixed;

right:20px;
bottom:112px;

width:72px;
height:72px;

border-radius:50%;

background:#25D366;

display:flex;
justify-content:center;
align-items:center;

z-index:999;

box-shadow:
0 0 30px rgba(37,211,102,.5);
}

.float-btn img{

width:38px;
height:38px;
}

/* NAVBAR */

.bottom-nav{

position:fixed;

bottom:14px;
left:50%;

transform:translateX(-50%);

width:94%;
height:88px;

background:
rgba(12,12,12,.94);

backdrop-filter:blur(18px);

border-radius:32px;

display:flex;
justify-content:space-around;
align-items:center;

border:
1px solid rgba(255,255,255,.06);

box-shadow:
0 10px 35px rgba(0,0,0,.6);

z-index:1000;
}

.nav-item{

width:74px;

padding:11px 0;

border-radius:22px;

text-align:center;

text-decoration:none;

color:#bdbdbd;

font-size:12px;
font-weight:700;

transition:.3s;
}

.nav-item svg{

width:28px;
height:28px;

fill:currentColor;

display:block;

margin:auto;
margin-bottom:6px;
}

.nav-item:hover{

transform:translateY(-3px);

color:#ff2d2d;
}

.nav-item.active{

color:white;

background:
linear-gradient(
135deg,
rgba(255,0,0,.28),
rgba(255,0,0,.08)
);

box-shadow:
0 4px 20px rgba(255,0,0,.28);
}

/* SCROLL */

::-webkit-scrollbar{
width:0;
}

</style>
</head>

<script>

/* VIDEO */

const video =
document.getElementById('video');

const playBtn =
document.getElementById('playBtn');

const playMini =
document.getElementById('playMini');

const videoSrc =
'https://luna-4-video.mediaserver.digital/exitosatv_233b-4b49-a726-5a451262/index.m3u8';

if(Hls.isSupported()){

const hls = new Hls();

hls.loadSource(videoSrc);

hls.attachMedia(video);

}else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src = videoSrc;

}

/* PLAY */

function playVideo(){

video.play();

playBtn.style.display='none';

playMini.innerHTML='⏸';

}

function pauseVideo(){

video.pause();

playMini.innerHTML='▶';

}

playBtn.addEventListener('click',()=>{

playVideo();

});

playMini.addEventListener('click',()=>{

if(video.paused){

playVideo();

}else{

pauseVideo();

}

});

/* INSTALL */

let deferredPrompt;

window.addEventListener(
'beforeinstallprompt',
(e)=>{

e.preventDefault();

deferredPrompt=e;

}
);

const installBtn =
document.getElementById('installBtn');

installBtn.addEventListener(
'click',
async ()=>{

if(deferredPrompt){

deferredPrompt.prompt();

}

}
);

</script>
